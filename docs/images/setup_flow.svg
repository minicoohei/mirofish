<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="step" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="cli" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="580" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">AI Agent Setup Guide</text>
  <text x="440" y="58" text-anchor="middle" fill="#64748b" font-size="12">Clone, install, and run a full career simulation in 3 steps</text>

  <!-- Step 1: Clone & Install -->
  <g filter="shadow">
    <rect x="30" y="80" width="250" height="120" rx="10" fill="url(#step)" stroke="#334155" stroke-width="1"/>
  </g>
  <circle cx="58" cy="105" r="14" fill="#3b82f6" filter="glow"/>
  <text x="58" y="110" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">1</text>
  <text x="80" y="110" fill="#e2e8f0" font-size="14" font-weight="600">Clone &amp; Install</text>
  <text x="46" y="135" fill="#94a3b8" font-size="11" font-family="'SF Mono','Fira Code',monospace">$ git clone ... &amp;&amp; cd mirofish</text>
  <text x="46" y="152" fill="#94a3b8" font-size="11" font-family="'SF Mono','Fira Code',monospace">$ pip install -e ".[all]"</text>
  <rect x="46" y="168" width="56" height="18" rx="4" fill="#1e40af" opacity="0.6"/>
  <text x="74" y="181" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">~30 sec</text>

  <!-- Step 2: Prepare Input -->
  <g filter="shadow">
    <rect x="315" y="80" width="250" height="120" rx="10" fill="url(#step)" stroke="#334155" stroke-width="1"/>
  </g>
  <circle cx="343" cy="105" r="14" fill="#3b82f6" filter="glow"/>
  <text x="343" y="110" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">2</text>
  <text x="365" y="110" fill="#e2e8f0" font-size="14" font-weight="600">Prepare Resume</text>
  <text x="331" y="135" fill="#94a3b8" font-size="11">Place your resume (PDF/TXT) in the</text>
  <text x="331" y="152" fill="#94a3b8" font-size="11">project directory. Any format works.</text>
  <rect x="331" y="168" width="72" height="18" rx="4" fill="#1e40af" opacity="0.6"/>
  <text x="367" y="181" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">Your input</text>

  <!-- Step 3: Run -->
  <g filter="shadow">
    <rect x="600" y="80" width="250" height="120" rx="10" fill="url(#step)" stroke="#334155" stroke-width="1"/>
  </g>
  <circle cx="628" cy="105" r="14" fill="#3b82f6" filter="glow"/>
  <text x="628" y="110" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">3</text>
  <text x="650" y="110" fill="#e2e8f0" font-size="14" font-weight="600">Run Simulation</text>
  <text x="616" y="135" fill="#94a3b8" font-size="11" font-family="'SF Mono','Fira Code',monospace">$ claude / kimi / opencode</text>
  <text x="616" y="152" fill="#94a3b8" font-size="11">"Run MiroFish for resume.pdf"</text>
  <rect x="616" y="168" width="80" height="18" rx="4" fill="#1e40af" opacity="0.6"/>
  <text x="656" y="181" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">~15-30 min</text>

  <!-- Arrows between steps -->
  <path d="M280,140 L315,140" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <path d="M565,140 L600,140" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Divider -->
  <line x1="40" y1="225" x2="840" y2="225" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="245" text-anchor="middle" fill="#64748b" font-size="11">What happens inside (automated by AI agent orchestrator)</text>

  <!-- Pipeline Row 1 -->
  <!-- Phase 0 -->
  <g filter="shadow">
    <rect x="30" y="265" width="105" height="65" rx="8" fill="url(#cli)" stroke="#34d399" stroke-width="1"/>
  </g>
  <text x="82" y="288" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Phase 0</text>
  <text x="82" y="302" text-anchor="middle" fill="#d1fae5" font-size="9">Profile Init</text>
  <rect x="42" y="308" width="30" height="13" rx="3" fill="#065f46"/>
  <text x="57" y="317" text-anchor="middle" fill="#6ee7b7" font-size="7">CLI</text>

  <!-- Phase 1a -->
  <g filter="shadow">
    <rect x="155" y="265" width="105" height="65" rx="8" fill="url(#agent)" stroke="#a78bfa" stroke-width="1"/>
  </g>
  <text x="207" y="288" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Phase 1a</text>
  <text x="207" y="302" text-anchor="middle" fill="#ddd6fe" font-size="9">Path Design</text>
  <rect x="167" y="308" width="48" height="13" rx="3" fill="#4c1d95"/>
  <text x="191" y="317" text-anchor="middle" fill="#c4b5fd" font-size="7">LLM</text>

  <!-- Phase 1b -->
  <g filter="shadow">
    <rect x="280" y="265" width="105" height="65" rx="8" fill="url(#agent)" stroke="#a78bfa" stroke-width="1"/>
  </g>
  <text x="332" y="288" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Phase 1b</text>
  <text x="332" y="302" text-anchor="middle" fill="#ddd6fe" font-size="9">Expand x5</text>
  <rect x="292" y="308" width="48" height="13" rx="3" fill="#4c1d95"/>
  <text x="316" y="317" text-anchor="middle" fill="#c4b5fd" font-size="7">5 Parallel</text>

  <!-- Phase 2 -->
  <g filter="shadow">
    <rect x="405" y="265" width="105" height="65" rx="8" fill="url(#cli)" stroke="#34d399" stroke-width="1"/>
  </g>
  <text x="457" y="288" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Phase 2</text>
  <text x="457" y="302" text-anchor="middle" fill="#d1fae5" font-size="9">Score &amp; Rank</text>
  <rect x="417" y="308" width="30" height="13" rx="3" fill="#065f46"/>
  <text x="432" y="317" text-anchor="middle" fill="#6ee7b7" font-size="7">CLI</text>

  <!-- Phase 3-4 -->
  <g filter="shadow">
    <rect x="530" y="265" width="105" height="65" rx="8" fill="url(#agent)" stroke="#f472b6" stroke-width="1"/>
  </g>
  <text x="582" y="288" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Phase 3-4</text>
  <text x="582" y="302" text-anchor="middle" fill="#fce7f3" font-size="9">30-Agent Swarm</text>
  <rect x="542" y="308" width="48" height="13" rx="3" fill="#831843"/>
  <text x="566" y="317" text-anchor="middle" fill="#f9a8d4" font-size="7">Swarm</text>

  <!-- Phase 5-7 -->
  <g filter="shadow">
    <rect x="655" y="265" width="105" height="65" rx="8" fill="url(#agent)" stroke="#06b6d4" stroke-width="1"/>
  </g>
  <text x="707" y="288" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Phase 5-7</text>
  <text x="707" y="302" text-anchor="middle" fill="#cffafe" font-size="9">Verify &amp; Enrich</text>
  <rect x="667" y="308" width="48" height="13" rx="3" fill="#164e63"/>
  <text x="691" y="317" text-anchor="middle" fill="#67e8f9" font-size="7">Tavily</text>

  <!-- Phase 8 -->
  <g filter="shadow">
    <rect x="780" y="265" width="75" height="65" rx="8" fill="url(#cli)" stroke="#fbbf24" stroke-width="1"/>
  </g>
  <text x="817" y="288" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Phase 8</text>
  <text x="817" y="302" text-anchor="middle" fill="#fef3c7" font-size="9">Report</text>
  <rect x="792" y="308" width="30" height="13" rx="3" fill="#78350f"/>
  <text x="807" y="317" text-anchor="middle" fill="#fde68a" font-size="7">CLI</text>

  <!-- Arrows between phases -->
  <path d="M135,297 L155,297" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <path d="M260,297 L280,297" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <path d="M385,297 L405,297" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <path d="M510,297 L530,297" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <path d="M635,297 L655,297" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <path d="M760,297 L780,297" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Bottom section: Optional deps -->
  <g filter="shadow">
    <rect x="30" y="360" width="820" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <text x="50" y="382" fill="#94a3b8" font-size="11" font-weight="600">Optional:</text>
  <rect x="115" y="370" width="130" height="22" rx="4" fill="#1a2744" stroke="#334155" stroke-width="1"/>
  <text x="180" y="385" text-anchor="middle" fill="#93c5fd" font-size="10">Zep Knowledge Graph</text>
  <rect x="255" y="370" width="130" height="22" rx="4" fill="#1a2744" stroke="#334155" stroke-width="1"/>
  <text x="320" y="385" text-anchor="middle" fill="#93c5fd" font-size="10">Tavily Web Search</text>
  <rect x="395" y="370" width="130" height="22" rx="4" fill="#1a2744" stroke="#334155" stroke-width="1"/>
  <text x="460" y="385" text-anchor="middle" fill="#93c5fd" font-size="10">OpenTelemetry</text>
  <rect x="535" y="370" width="130" height="22" rx="4" fill="#1a2744" stroke="#334155" stroke-width="1"/>
  <text x="600" y="385" text-anchor="middle" fill="#93c5fd" font-size="10">Rich CLI Output</text>
  <text x="50" y="405" fill="#64748b" font-size="9">pip install -e ".[all]" to enable all. Pipeline works without any optional deps.</text>

  <!-- Legend -->
  <g transform="translate(30, 435)">
    <rect width="820" height="60" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <rect x="20" y="14" width="14" height="14" rx="3" fill="url(#cli)" stroke="#34d399" stroke-width="1"/>
    <text x="42" y="25" fill="#94a3b8" font-size="11">Python CLI (deterministic, 0 tokens)</text>
    <rect x="270" y="14" width="14" height="14" rx="3" fill="url(#agent)" stroke="#a78bfa" stroke-width="1"/>
    <text x="292" y="25" fill="#94a3b8" font-size="11">LLM reasoning (any model)</text>
    <rect x="480" y="14" width="14" height="14" rx="3" fill="url(#agent)" stroke="#f472b6" stroke-width="1"/>
    <text x="502" y="25" fill="#94a3b8" font-size="11">Agent Swarm</text>
    <rect x="610" y="14" width="14" height="14" rx="3" fill="url(#agent)" stroke="#06b6d4" stroke-width="1"/>
    <text x="632" y="25" fill="#94a3b8" font-size="11">Tavily verification</text>
    <text x="20" y="48" fill="#475569" font-size="10">Output: self-contained HTML report with 10 interactive sections, no server needed</text>
  </g>

  <!-- Watermark -->
  <text x="440" y="520" text-anchor="middle" fill="#1e293b" font-size="10">Optimized for Claude Code. Compatible with any AI coding agent.</text>
</svg>
